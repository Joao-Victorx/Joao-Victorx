name: Generate Snake

# Controla quando a ação será executada. Esta ação roda a cada 6 horas.
on:
  schedule:
      # a cada 6 horas
    - cron: "0 */6 * * *"

# Este comando nos permite rodar a Action manualmente a partir da aba Actions.
  workflow_dispatch:

# A sequência de execuções neste workflow:
jobs:
  # Este workflow contém um único job chamado "build"
  build:
    # O tipo de executor onde o job será rodado
    runs-on: ubuntu-latest

    # Os passos (steps) representam uma sequência de tarefas que serão executadas como parte do job
    steps:

    # Faz o checkout do repositório em $GITHUB_WORKSHOP, para que seu job possa acessá-lo
      - uses: actions/checkout@v2

    # Gera a cobrinha  
      - uses: Platane/snk@master
        id: snake-gif
        with:
          github_user_name: Joao-Victorx
          # estas próximas 2 linhas geram os arquivos em uma branch chamada "output". Isso evita acumular arquivos na branch main.
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg

     # Mostra o status do build. Facilita a depuração (se houver algum problema).
      - run: git status

      # Envia as alterações (Push)
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: master
          force: true

      - uses: crazy-max/ghaction-github-pages@v2.1.3
        with:
          # a branch de destino (output) que mencionamos acima
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
