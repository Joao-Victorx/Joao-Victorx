name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *" # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Pacman SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-pacman.svg?palette=github-light&color_snake=#e5a93b&color_dots=#ebedf0,#7fa1c3,#517da8,#1e4a75
            dist/github-contribution-grid-pacman-dark.svg?palette=github-dark&color_snake=#e5a93b&color_dots=#161b22,#7fa1c3,#517da8,#1e4a75

      - name: Push Changes
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
