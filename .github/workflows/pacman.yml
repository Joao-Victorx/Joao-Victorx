name: Generate Pacman

on:
  schedule:
    - cron: "0 0 * * *" # Roda automaticamente todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente quando você quiser
  push:
    branches:
    - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Generate Pacman SVG
        uses: jasonlong/github-contribution-calendar-to-gif@master
        with:
          github_user_name: ${{ github.repository_owner }}
          output_dir: dist
          theme: pacman

      - name: Push Changes
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
