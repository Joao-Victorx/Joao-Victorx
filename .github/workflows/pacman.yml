name: Generate pacman animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # Garante que as pastas necessárias existam
      - name: Create dist directory
        run: mkdir -p dist

      # Gera o gráfico do Pacman atualizado e aceitando customização
      - name: generate pacman-contribution-graph.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          filename: dist/pacman-contribution-graph.svg
          config_timezone: America/Sao_Paulo
          
          # Ativação do tema escuro oficial
          config_order: unepixeled
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          
          # Aqui forçamos o modo escuro no gráfico
          base: ""
          config_theme: dark

      # Envia o arquivo final para a branch 'output'
      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
